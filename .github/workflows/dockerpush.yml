name: ci

'on':
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm run test

      - name: Read package version
        id: version
        run: node -e "console.log('value=' + require('./package.json').version)" >> "$GITHUB_OUTPUT"

      - name: Build
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set Docker tags
        id: meta
        if: github.event_name == 'push'
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            VERSION="$(node -p "require('./package.json').version")"
            echo "tags=nl2109/serversentinel:latest,nl2109/serversentinel:${VERSION},nl2109/serversentinel:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          elif [ "${GITHUB_REF_NAME}" = "dev" ]; then
            echo "tags=nl2109/serversentinel:dev,nl2109/serversentinel:dev-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          else
            echo "Unsupported branch: ${GITHUB_REF_NAME}"
            exit 1
          fi

      - name: Build PR test image
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          build-args: |
            SS_BUILD_ID=${{ github.sha }}
            SS_VERSION=${{ steps.version.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: false

      - name: Build and push
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            SS_BUILD_ID=${{ github.sha }}
            SS_VERSION=${{ steps.version.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
