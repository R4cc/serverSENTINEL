name: README screenshots

on:
  push:
    branches:
      - dev
    paths:
      - web/**
      - server/**
      - scripts/update-readme-screenshots.mjs
      - package.json
      - package-lock.json
      - .github/workflows/readme-screenshots.yml
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

concurrency:
  group: readme-screenshots-dev
  cancel-in-progress: true

permissions:
  actions: write
  contents: write
  pull-requests: write

jobs:
  update:
    name: Update README screenshots
    runs-on: ubuntu-latest
    timeout-minutes: 20
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble@sha256:cf0daee9b994042e011bc29f20cdff1a9f682a039b43fcd738f7d8a9d3bcd9d6

    steps:
      - name: Checkout dev
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: dev

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Capture screenshots
        run: npm run screenshots:update

      - name: Create or update screenshot pull request
        id: pull-request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          branch: automation/readme-screenshots
          base: dev
          delete-branch: true
          add-paths: docs/screenshots/*.png
          commit-message: "docs: refresh README screenshots"
          title: "docs: refresh README screenshots"
          body: |
            Automated screenshots captured from the isolated serverSENTINEL demo environment.

            - Fixed Chromium, viewport, locale, time zone, clock, and theme
            - Uses the repository-owned `demo / demo` account and a fresh data directory
            - Generated by `.github/workflows/readme-screenshots.yml`

      # GITHUB_TOKEN-authored pull requests do not emit another pull_request event.
      # Dispatch the existing CI workflow so required checks still attach to the branch.
      - name: Run existing CI on the screenshot branch
        if: steps.pull-request.outputs.pull-request-operation == 'created' || steps.pull-request.outputs.pull-request-operation == 'updated'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'dockerpush.yml',
              ref: '${{ steps.pull-request.outputs.pull-request-branch }}'
            })
